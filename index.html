<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaiona Framework</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #fff;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 32px 24px;
  font-family: 'Inter', sans-serif;
}

.kf-root {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  width: 100%;
  max-width: 1080px;
}

.kf-header { margin-bottom: 16px; }

.kf-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(24px, 4vw, 48px);
  letter-spacing: 0.14em;
  color: #111;
  line-height: 1;
}

.kf-hint {
  font-size: 11px;
  color: #aaa;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 6px;
}

/* ── Main layout ─────────────────────────────────────── */
.kf-layout {
  display: flex;
  flex-direction: row;
  align-items: center;
  width: 100%;
  gap: 0;
}

/* ── Diagram — square container ──────────────────────── */
.kf-diagram {
  position: relative;
  flex-shrink: 0;
  width: min(580px, 90vw);
  aspect-ratio: 1 / 1;   /* perfect square */
}

/* ── Generic piece ───────────────────────────────────── */
.piece {
  position: absolute;
  transition:
    opacity   0.38s cubic-bezier(.4,0,.2,1),
    filter    0.38s cubic-bezier(.4,0,.2,1),
    transform 0.38s cubic-bezier(.4,0,.2,1);
  transform-origin: center center;
}

.piece img {
  display: block;
  width: 100%;
  height: 100%;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

.piece.interactive { cursor: pointer; }

.piece.dimmed {
  opacity: 0.22;
  filter: grayscale(0.2) brightness(0.85);
}

/* ── Gold glow + pulse ───────────────────────────────── */
@keyframes glow-pulse {
  0%, 100% {
    filter: drop-shadow(0 0 8px #FFCB74)
            drop-shadow(0 0 20px rgba(255,203,116,.55))
            brightness(1.07);
  }
  50% {
    filter: drop-shadow(0 0 16px #FFCB74)
            drop-shadow(0 0 36px rgba(255,203,116,.75))
            brightness(1.14);
  }
}

.piece.active-glow {
  animation: glow-pulse 2.2s ease-in-out infinite;
  transform: scale(1.07);
  z-index: 20 !important;
}

/* ── Kaiona center ───────────────────────────────────── */
.piece-kaiona {
  width: 55%; height: 55%;
  top: 22.5%; left: 22.5%;
  z-index: 1;
}

/* ── 6 outer pieces — mathematically evenly spaced ──── */
/* Generated: orbit_r=38%, outer_sz=20%, 60° apart */
.piece-mauli-ola {
  width: 20%; height: 20%;
  top: 2.0%; left: 40.0%;
  z-index: 2;
}
.piece-ea {
  width: 20%; height: 20%;
  top: 21.0%; left: 72.9%;
  z-index: 2;
}
.piece-piko {
  width: 20%; height: 20%;
  top: 59.0%; left: 72.9%;
  z-index: 2;
}
.piece-pilina {
  width: 20%; height: 20%;
  top: 78.0%; left: 40.0%;
  z-index: 2;
}
.piece-iwa {
  width: 20%; height: 20%;
  top: 59.0%; left: 7.1%;
  z-index: 2;
}
.piece-waiwai {
  width: 20%; height: 20%;
  top: 21.0%; left: 7.1%;
  z-index: 2;
}


/* ── Info Panel ──────────────────────────────────────── */
.kf-info {
  flex: 1;
  min-width: 180px;
  max-width: 300px;
  margin-left: 40px;
  padding: 0 0 0 28px;
  border-left: 3px solid #A11811;
  opacity: 0;
  transform: translateX(18px);
  transition: opacity 0.42s ease, transform 0.42s ease;
  pointer-events: none;
}

.kf-info.visible {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}

.kf-info-ornament {
  width: 36px;
  height: 3px;
  background: linear-gradient(90deg, #A11811, #FFCB74);
  border-radius: 2px;
  margin-bottom: 14px;
}

.kf-info-name {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: clamp(20px, 2.2vw, 30px);
  color: #A11811;
  text-transform: uppercase;
  letter-spacing: 0.10em;
  text-decoration: underline;
  text-underline-offset: 5px;
  text-decoration-color: rgba(161,24,17,.35);
  margin-bottom: 14px;
  line-height: 1.05;
}

.kf-info-desc {
  font-family: 'Inter', sans-serif;
  font-size: clamp(12px, 1.05vw, 14.5px);
  color: #2C2C2C;
  line-height: 1.8;
}

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 720px) {
  .kf-layout { flex-direction: column; align-items: flex-start; }
  .kf-info {
    margin-left: 0;
    margin-top: 20px;
    max-width: 100%;
    width: 100%;
    transform: translateY(12px);
  }
  .kf-info.visible { transform: translateY(0); }
}
</style>
</head>

    <!-- Info Panel -->

      <div class="kf-info-ornament"></div>
      <div class="kf-info-name" id="kfInfoName"></div>
      <div class="kf-info-desc" id="kfInfoDesc"></div>
    </div>

  </div><!-- /.kf-layout -->
</div>

<script>
const SECTIONS = {
  'mauli-ola': {
    label: 'Mauli Ola',
    description: 'This symbol is inspired by the lōkahi triangle that Aunty Lynette Paglinawan taught about in her Hoʻoponopono courses. This triangle represents balance and harmony between kānaka, akua, and ʻāina. This also symbolizes our mauna that watch over and protect us.'
  },
  'ea': {
    label: 'Ea',
    description: 'This symbolizes the movement of makani that fills our sails, refreshes, motivates, and liberates us to move toward our intended destinations.'
  },
  'piko': {
    label: 'Piko',
    description: 'This symbolizes the birth and being of kānaka throughout time, from our kūpuna, to us, and to our keiki. This embodies the layers of Kaiāulu — kama, ʻohana nui, kaiāulu, and lāhui — as the entire framework is contained within one piko of our lāhui.'
  },
  'pilina': {
    label: 'Pilina',
    description: 'This symbol is comprised of the lau hala motif seen in many kākau ʻuhi and kapa designs. This symbolizes the interweaving of kānaka in mutually sustaining relationships that foster support and solidarity. This is also a nod to the original framework concept image of a waʻa, as ancient waʻa sails were made from lau hala.'
  },
  'iwa': {
    label: 'ʻIwa',
    description: 'The ʻiwa is a symbol of the guidance of our moʻolelo which contains the essence of our culture. Kaiona, the akua who resides atop Mauna Kaʻala, sends her iwa to guide lost travelers, just as our moʻolelo guide us toward the timeless values, ideals, and principles of our lāhui.'
  },
  'waiwai': {
    label: 'Waiwai',
    description: 'This symbolizes the wai that is our wealth and ancestral abundance that nourishes our well-being today as kānaka.'
  }
};

const pieces    = document.querySelectorAll('.piece.interactive');
const infoPanel = document.getElementById('kfInfo');
const infoName  = document.getElementById('kfInfoName');
const infoDesc  = document.getElementById('kfInfoDesc');
let activeKey   = null;
let leaveTimer  = null;

function activate(key) {
  clearTimeout(leaveTimer);
  if (activeKey === key) return;
  activeKey = key;
  pieces.forEach(p => {
    p.classList.remove('active-glow', 'dimmed');
    p.classList.add(p.dataset.key === key ? 'active-glow' : 'dimmed');
  });
  const s = SECTIONS[key];
  infoName.textContent = s.label;
  infoDesc.textContent = s.description;
  infoPanel.classList.add('visible');
}

function deactivate() {
  leaveTimer = setTimeout(() => {
    activeKey = null;
    pieces.forEach(p => p.classList.remove('active-glow', 'dimmed'));
    infoPanel.classList.remove('visible');
  }, 200);
}

pieces.forEach(p => {
  p.addEventListener('mouseenter', () => activate(p.dataset.key));
  p.addEventListener('mouseleave', deactivate);
  p.addEventListener('touchstart', e => { e.preventDefault(); activate(p.dataset.key); }, {passive: false});
});
infoPanel.addEventListener('mouseenter', () => clearTimeout(leaveTimer));
infoPanel.addEventListener('mouseleave', deactivate);
</script>
