<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaiona Framework</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 32px 24px;
  font-family: 'Inter', sans-serif;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url('background.jpg') center / cover no-repeat;
  filter: blur(14px) brightness(0.55);
  transform: scale(1.05);
  z-index: -1;
}

.kf-root {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 1080px;
}

.kf-header { display: none; }

.kf-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(24px, 4vw, 48px);
  letter-spacing: 0.14em;
  color: #111;
  line-height: 1;
}

.kf-hint {
  font-size: 11px;
  color: #aaa;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 6px;
}

/* ── Main layout ─────────────────────────────────────── */
.kf-layout {
  display: flex;
  flex-direction: row;
  align-items: center;
  position: relative;
}

/* ── Diagram — square container ──────────────────────── */
.kf-diagram {
  position: relative;
  flex-shrink: 0;
  width: min(720px, 90vw);
  aspect-ratio: 1 / 1;   /* perfect square */
}

/* ── Generic piece ───────────────────────────────────── */
.piece {
  position: absolute;
  transition:
    opacity   0.38s cubic-bezier(.4,0,.2,1),
    filter    0.38s cubic-bezier(.4,0,.2,1),
    transform 0.38s cubic-bezier(.4,0,.2,1);
  transform-origin: center center;
}

.piece img {
  display: block;
  width: 100%;
  height: 100%;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

.piece.interactive { cursor: pointer; }

.piece.dimmed {
  opacity: 0.22;
  filter: grayscale(0.2) brightness(0.85);
}

/* ── Gold glow + pulse ───────────────────────────────── */
@keyframes glow-pulse {
  0%, 100% {
    filter: drop-shadow(0 0 8px #FFCB74)
            drop-shadow(0 0 20px rgba(255,203,116,.55))
            brightness(1.07);
  }
  50% {
    filter: drop-shadow(0 0 16px #FFCB74)
            drop-shadow(0 0 36px rgba(255,203,116,.75))
            brightness(1.14);
  }
}

.piece.active-glow {
  animation: glow-pulse 2.2s ease-in-out infinite;
  transform: scale(1.07);
  z-index: 20 !important;
}

/* ── Kaiona center ───────────────────────────────────── */
.piece-kaiona {
  width: 55%; height: 55%;
  top: 22.5%; left: 22.5%;
  z-index: 1;
}

/* ── 4 outer pieces — evenly spaced at 90° apart ──────── */
/* orbit_r=42%, outer_sz=26%, 90° apart                   */
.piece-mauli-ola {
  width: 26%; height: 26%;
  top: -5%; left: 37%;
  z-index: 2;
}
.piece-ea {
  width: 26%; height: 26%;
  top: 37%; left: 79%;
  z-index: 2;
}
.piece-piko {
  display: none;
}
.piece-pilina {
  width: 26%; height: 26%;
  top: 79%; left: 37%;
  z-index: 2;
}
.piece-iwa {
  width: 34%; height: 34%;
  top: 33%; left: 33%;
  z-index: 10;
  pointer-events: none;
  animation: iwa-float 4s ease-in-out infinite;
}

@keyframes iwa-float {
  0%, 100% { transform: translateY(0)      rotate(0deg);   }
  40%       { transform: translateY(-10px) rotate(1.5deg); }
  70%       { transform: translateY(-5px)  rotate(-1deg);  }
}
.piece-waiwai {
  width: 26%; height: 26%;
  top: 37%; left: -5%;
  z-index: 2;
}


/* ── Info Panel — centered overlay popup ─────────────── */
.kf-info {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 52%;
  padding: 20px 24px;
  background: rgba(255, 255, 255, 0.97);
  border-left: 3px solid #A11811;
  border-radius: 12px;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.13), 0 2px 8px rgba(0, 0, 0, 0.06);
  z-index: 30;
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.95);
  transition: opacity 0.25s ease 0.15s, transform 0.25s ease 0.15s;
  pointer-events: none;
}

.kf-info.visible {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: auto;
}

.kf-info-ornament {
  width: 36px;
  height: 3px;
  background: linear-gradient(90deg, #A11811, #FFCB74);
  border-radius: 2px;
  margin-bottom: 14px;
}

.kf-info-name {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: clamp(20px, 2.2vw, 30px);
  color: #A11811;
  text-transform: uppercase;
  letter-spacing: 0.10em;
  text-decoration: underline;
  text-underline-offset: 5px;
  text-decoration-color: rgba(161,24,17,.35);
  margin-bottom: 14px;
  line-height: 1.05;
}

.kf-info-desc {
  font-family: 'Inter', sans-serif;
  font-size: clamp(12px, 1.05vw, 14.5px);
  color: #2C2C2C;
  line-height: 1.8;
}

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 720px) {
  .kf-layout { align-items: center; }
}
</style>
</head>

      <div class="kf-info-ornament"></div>
      <div class="kf-info-name" id="kfInfoName"></div>
      <div class="kf-info-desc" id="kfInfoDesc"></div>
    </div>

  </div><!-- /.kf-layout -->
</div>

<script>
const SECTIONS = {
  'mauli-ola': {
    label: 'Mauli Ola',
    description: 'MAʻO Farm: Building capacity and well-being through social enterprise in order to build a future of mā ona, of plenty, by connecting youth and land through daily practice of aloha ʻāina.'
  },
  'ea': {
    label: 'Ea',
    description: 'Kaʻala Farm: Reclaiming and preserving the living culture of the poʻe kahiko (people of old) in order to strengthen the kinship relationships between ʻāina and all forms of life.'
  },
  'piko': {
    label: 'Piko',
    description: 'This symbolizes the birth and being of kānaka throughout time, from our kūpuna, to us, and to our keiki. This embodies the layers of Kaiāulu — kama, ʻohana nui, kaiāulu, and lāhui — as the entire framework is contained within one piko of our lāhui.'
  },
  'pilina': {
    label: 'Pilina',
    description: 'Hoa ʻĀina O Mākaha creates peaceful communities in harmony with nature by focusing on community self-reliance and supporting families on the Waiʻanae Coast.'
  },
  'iwa': {
    label: 'ʻIwa',
    description: 'The ʻiwa is a symbol of the guidance of our moʻolelo which contains the essence of our culture. Kaiona, the akua who resides atop Mauna Kaʻala, sends her iwa to guide lost travelers, just as our moʻolelo guide us toward the timeless values, ideals, and principles of our lāhui.'
  },
  'waiwai': {
    label: 'Waiwai',
    description: 'E Ala Voyaging Academy: Empowering and uniting our community by preserving and celebrating traditional Hawaiian practices, especially traditional navigational practices with E Ala waʻa, a 45 foot double-hulled canoe birthed out of Pokaʻi.'
  }
};

const pieces    = document.querySelectorAll('.piece.interactive');
const infoPanel = document.getElementById('kfInfo');
const infoName  = document.getElementById('kfInfoName');
const infoDesc  = document.getElementById('kfInfoDesc');
let activeKey   = null;
let leaveTimer  = null;

function activate(key) {
  clearTimeout(leaveTimer);
  if (activeKey === key) return;
  activeKey = key;
  pieces.forEach(p => {
    p.classList.remove('active-glow', 'dimmed');
    p.classList.add(p.dataset.key === key ? 'active-glow' : 'dimmed');
  });
  const s = SECTIONS[key];
  infoName.textContent = s.label;
  infoDesc.textContent = s.description;
  infoPanel.classList.add('visible');
}

function deactivate() {
  leaveTimer = setTimeout(() => {
    activeKey = null;
    pieces.forEach(p => p.classList.remove('active-glow', 'dimmed'));
    infoPanel.classList.remove('visible');
  }, 200);
}

pieces.forEach(p => {
  p.addEventListener('mouseenter', () => activate(p.dataset.key));
  p.addEventListener('mouseleave', deactivate);
  p.addEventListener('touchstart', e => { e.preventDefault(); activate(p.dataset.key); }, {passive: false});
});
infoPanel.addEventListener('mouseenter', () => clearTimeout(leaveTimer));
infoPanel.addEventListener('mouseleave', deactivate);
</script>
